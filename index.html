<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Photo Gallery</title>
<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
    background:#f4f4f4;
}
h{
    margin:15px 0;
}
button{
    padding:8px 16px;
    cursor:pointer;
}
#albums, #photos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:20px;
}
.album, .photo{
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    transition:.2s;
}
.album:hover, .photo:hover{
    transform:translateY(-4px);
}
.album img, .photo img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
}
.album h3, .photo div{
    padding:10px;
    margin:0;
}
.album p{
    margin:0;
    padding:0 10px 12px;
    color:#666;
}
#header, #footer{
    max-width:1100px;
    margin:20px auto;
}
#footer{
    margin-top:40px;
    padding-top:20px;
    border-top:1px solid #ddd;
    color:#666;
    text-align:center;
}
</style>
</head>
<body>
	<div id="title">Photo Gallery</div>
	<div id="header"></div>
	<div id="albums"></div>
	<div id="albumView" style="display:none">
		<button onclick="loadAlbums()">Go back home</button>
		<h2 id="albumName"></h2>
		<div id="photos"></div>
	</div>
	<div id="footer"></div>
	<script>
		const API="https://script.google.com/macros/s/AKfycbzXP-aPMq8D45ESV8MwnjKgWjwBpXXeN1uBo9C1KX7_-v57E3LUJmE8QiWYfd6pJCG8IA/exec";
		async function api(action,id=""){
			let url = API + "?action=" + action;
			if(id){
				url += "&id=" + encodeURIComponent(id);
			}
			try{
				const r = await fetch(url);
				if(!r.ok){
					throw new Error("HTTP " + r.status);
				}
				return await r.json();
			}catch(e){
				console.error(e);
				return {
					success:false,
					message:e.message
				};
			}
		}
		async function loadConfig(){
			const res = await api("config");
			if(!res.success) return;
			const cfg = res.data;
			if(cfg.SiteTitle){
				document.title = cfg.SiteTitle;
				document.getElementById("title").innerText = cfg.SiteTitle;
			}
			if(cfg.Header){
				document.getElementById("header").innerHTML = `<img src="${cfg.Header}" style="width:120px;height:150px;display:block;">`;
			}
			if(cfg.Footer){
				document.getElementById("footer").textContent = cfg.Footer;
			}
		}
		async function loadAlbums(){
		    document.getElementById("albumView").style.display="none";
		    document.getElementById("albums").style.display = "grid";
			const res=await api("albums");
		    const div=document.getElementById("albums");
		    div.innerHTML="";
		    if(!res.success)return;
		    res.data.forEach(album=>{
		        div.innerHTML+=`
		        <div class="album" onclick="loadAlbum('${album.id}')">
		            <img src="${album.cover}" loading="lazy">
		            <h3>${album.name}</h3>
		            <p>${album.count} photos</p>
		        </div>
		        `;
		    });
		}
		async function loadAlbum(id){
		    const res=await api("album",id);
		    if(!res.success){
		        alert(res.message);
		        return;
		    }
		    document.getElementById("albums").style.display="none";
		    document.getElementById("albumView").style.display="block";
		    document.getElementById("albumName").innerText=res.album.name;
		    const div=document.getElementById("photos");
		    div.innerHTML="";
		    res.photos.forEach(photo=>{
		        div.innerHTML+=`
		        <div class="photo">
		            <img src="${photo.thumb}" loading="lazy" onclick="showImage('${photo.original}')">
		            <div>${photo.name}</div>
		        </div>
		        `;
		    });
		}
		loadConfig();
		loadAlbums();
	</script>
</body>
</html>
